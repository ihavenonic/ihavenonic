<!DOCTYPE html>
<html lang="uk" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>НСЗУ — Дані</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=IBM+Plex+Sans:wght@300;400;600&display=swap" rel="stylesheet">
<script src="labels.js"></script>
<style>
  :root {
    --bg: #f5f6f8;
    --surface: #ffffff;
    --surface2: #eef0f3;
    --border: #dde0e6;
    --accent: #16a34a;
    --accent-dim: #dcfce7;
    --text: #111318;
    --text-muted: #6b7280;
    --danger: #dc2626;
    --th-bg: #f0f2f5;
    --row-hover: #f0f2f5;
    --row-border: #eef0f3;
    --scrollbar-thumb: #c8cdd6;
    --mono: 'IBM Plex Mono', monospace;
    --sans: 'IBM Plex Sans', sans-serif;
  }
  [data-theme="dark"] {
    --bg: #0e0f11;
    --surface: #16181c;
    --surface2: #1e2026;
    --border: #2a2d34;
    --accent: #4ade80;
    --accent-dim: #1a3a26;
    --text: #e2e4e9;
    --text-muted: #6b7280;
    --danger: #f87171;
    --th-bg: #16181c;
    --row-hover: #1e2026;
    --row-border: #1e2026;
    --scrollbar-thumb: #3a3d44;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    font-size: 14px;
    min-height: 100vh;
    transition: background .2s, color .2s;
  }

  /* ── HEADER ── */
  header {
    border-bottom: 1px solid var(--border);
    padding: 12px 24px;
    display: flex;
    align-items: center;
    gap: 14px;
    position: sticky;
    top: 0;
    background: var(--surface);
    z-index: 100;
  }
  .logo {
    font-family: var(--mono);
    font-size: 13px;
    font-weight: 600;
    color: var(--accent);
    letter-spacing: .08em;
    text-transform: uppercase;
    white-space: nowrap;
  }
  .header-sep { flex: 1; }
  .status-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--accent);
    animation: pulse 2s infinite;
  }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }
  .status-label { font-family: var(--mono); font-size: 11px; color: var(--text-muted); }
  .theme-toggle {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 4px 10px;
    cursor: pointer;
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text-muted);
    display: flex;
    align-items: center;
    gap: 5px;
    transition: all .15s;
  }
  .theme-toggle:hover { border-color: var(--accent); color: var(--accent); }

  /* ── LAYOUT ── */
  .layout {
    display: grid;
    grid-template-columns: 300px 1fr;
    height: calc(100vh - 49px);
  }

  /* ── SIDEBAR ── */
  aside {
    border-right: 1px solid var(--border);
    overflow-y: auto;
    padding: 16px 0;
    background: var(--surface);
  }
  .sidebar-header {
    padding: 0 16px 12px;
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: .1em;
  }
  .table-item {
    padding: 10px 16px;
    cursor: pointer;
    border-left: 3px solid transparent;
    transition: all .15s;
    display: flex;
    flex-direction: column;
    gap: 3px;
  }
  .table-item:hover { background: var(--surface2); }
  .table-item.active { border-left-color: var(--accent); background: var(--accent-dim); }
  .table-name { font-family: var(--sans); font-size: 13px; color: var(--text); }
  .table-meta { font-family: var(--mono); font-size: 11px; color: var(--text-muted); }
  .sidebar-loading { padding: 16px; color: var(--text-muted); font-size: 12px; font-family: var(--mono); }

  /* ── MAIN ── */
  main { display: flex; flex-direction: column; overflow: hidden; background: var(--bg); }

  .toolbar {
    padding: 10px 16px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 8px;
    flex-wrap: wrap;
    background: var(--surface);
  }
  .toolbar-title {
    font-family: var(--mono);
    font-size: 13px;
    color: var(--accent);
    flex: 1;
    min-width: 160px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  input[type=text], select {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 6px 10px;
    border-radius: 6px;
    font-family: var(--mono);
    font-size: 12px;
    outline: none;
    transition: border-color .15s;
  }
  input[type=text]:focus, select:focus { border-color: var(--accent); }
  #searchInput { width: 200px; }
  #columnSelect { width: 150px; }
  #pageSizeSelect { width: 110px; }

  .btn {
    padding: 6px 14px;
    border-radius: 6px;
    border: none;
    cursor: pointer;
    font-family: var(--mono);
    font-size: 12px;
    font-weight: 600;
    transition: all .15s;
  }
  .btn-primary { background: var(--accent); color: #fff; }
  [data-theme="dark"] .btn-primary { color: #000; }
  .btn-primary:hover { opacity: .85; }
  .btn-ghost { background: transparent; border: 1px solid var(--border); color: var(--text-muted); }
  .btn-ghost:hover { border-color: var(--accent); color: var(--accent); }
  .btn-ghost:disabled { opacity: .4; cursor: default; }

  /* ── DESCRIPTION BOX ── */
  .description-box {
    margin: 14px 16px 0;
    padding: 12px 16px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    font-size: 13px;
    color: var(--text-muted);
    line-height: 1.6;
    min-height: 48px;
    white-space: pre-wrap;
  }
  .description-box:empty::before {
    content: "Опис набору даних. Відредагуйте цей текст у labels.js";
    color: var(--border);
    font-style: italic;
  }
  .description-box.hidden { display: none; }

  /* ── TABLE ── */
  .table-wrap { flex: 1; overflow: auto; position: relative; margin-top: 14px; }

  table { width: 100%; border-collapse: collapse; font-size: 12px; }
  thead { position: sticky; top: 0; z-index: 10; background: var(--th-bg); }
  th {
    padding: 9px 14px;
    text-align: left;
    font-family: var(--mono);
    font-size: 11px;
    font-weight: 600;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: .07em;
    border-bottom: 1px solid var(--border);
    white-space: nowrap;
    cursor: pointer;
    user-select: none;
    transition: color .1s;
  }
  th:hover { color: var(--accent); }

  /* Стрілки сортування — завжди видно, активна підсвічена */
  .th-inner { display: flex; align-items: center; gap: 5px; }
  .sort-arrows { display: flex; flex-direction: column; gap: 1px; opacity: .3; }
  .sort-arrows .arr { font-size: 8px; line-height: 1; }
  th.sort-asc  .sort-arrows .arr-up   { opacity: 1; color: var(--accent); }
  th.sort-desc .sort-arrows .arr-down { opacity: 1; color: var(--accent); }
  th.sort-asc  .sort-arrows,
  th.sort-desc .sort-arrows { opacity: 1; }

  td {
    padding: 7px 14px;
    border-bottom: 1px solid var(--row-border);
    color: var(--text);
    max-width: 320px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    font-family: var(--mono);
    font-size: 12px;
  }
  tr:hover td { background: var(--row-hover); }

  /* ── PAGINATION ── */
  .pagination {
    padding: 8px 16px;
    border-top: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 8px;
    font-family: var(--mono);
    font-size: 12px;
    color: var(--text-muted);
    background: var(--surface);
    flex-wrap: wrap;
    margin-top: 14px;
  }
  .pagination .sep { flex: 1; }
  .page-info { color: var(--text); }

  /* ── STATES ── */
  .state-box {
    display: flex; align-items: center; justify-content: center;
    height: 100%; flex-direction: column; gap: 12px;
    color: var(--text-muted); font-family: var(--mono); font-size: 13px;
  }
  .state-icon { font-size: 32px; }
  .error-text { color: var(--danger); font-size: 12px; max-width: 400px; text-align: center; }
  .spinner {
    width: 24px; height: 24px;
    border: 2px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin .7s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--scrollbar-thumb); border-radius: 3px; }
</style>
</head>
<body>

<header>
  <div class="logo">НСЗУ / Відкриті дані</div>
  <div class="header-sep"></div>
  <button class="theme-toggle" id="themeToggle">☀️ Світла</button>
  <div class="status-dot" id="statusDot"></div>
  <div class="status-label" id="statusLabel">з'єднання...</div>
</header>

<div class="layout">
  <aside>
    <div class="sidebar-header">Таблиці</div>
    <div id="tableList"><div class="sidebar-loading">Завантаження...</div></div>
  </aside>

  <main>
    <div class="toolbar">
      <div class="toolbar-title" id="toolbarTitle">← Оберіть таблицю</div>
      <input type="text" id="searchInput" placeholder="Пошук..." disabled>
      <select id="columnSelect" disabled><option value="">Всі колонки</option></select>
      <button class="btn btn-primary" id="searchBtn" disabled>Знайти</button>
      <button class="btn btn-ghost" id="resetBtn" disabled>Скинути фільтри</button>
      <select id="pageSizeSelect">
        <option value="100" selected>100 рядків</option>
        <option value="1000">1 000 рядків</option>
        <option value="10000">10 000 рядків</option>
      </select>
    </div>

    <div class="description-box hidden" id="descriptionBox"></div>

    <div class="table-wrap" id="tableWrap">
      <div class="state-box">
        <div class="state-icon">📋</div>
        <div>Оберіть таблицю зі списку зліва</div>
      </div>
    </div>

    <div class="pagination" id="pagination" style="display:none">
      <button class="btn btn-ghost" id="prevBtn">← Назад</button>
      <button class="btn btn-ghost" id="nextBtn">Вперед →</button>
      <div class="sep"></div>
      <div class="page-info" id="pageInfo"></div>
    </div>
  </main>
</div>

<script>
// ── CONFIG ────────────────────────────────────────────────────────────────────
const API = "web-production-02dcb.up.railway.app";

// ── STATE ─────────────────────────────────────────────────────────────────────
let currentTable  = null;
let currentPage   = 1;
let totalPages    = 1;
let currentSearch = "";
let currentColumn = "";
let currentSort   = { by: null, dir: "asc" };

// ── HELPERS ───────────────────────────────────────────────────────────────────

// Парсить назву таблиці: latest_{код}_{дата}_...
// Повертає { code, date, label }
function parseTableName(name) {
  // Видаляємо префікс latest_
  const withoutPrefix = name.replace(/^latest_/, "");

  // Перший сегмент — код (6 символів або "manual")
  const parts = withoutPrefix.split("_");
  const code = parts[0];

  // Шукаємо дату у форматі YYYY_MM_DD
  const dateMatch = withoutPrefix.match(/(\d{4})_(\d{2})_(\d{2})/);
  const date = dateMatch ? `${dateMatch[1]}-${dateMatch[2]}-${dateMatch[3]}` : null;

  // Красива назва з labels.js або оригінальна
  const labels = window.TABLE_LABELS || {};
  const label = labels[code] || withoutPrefix.replace(/_/g, " ");

  return { code, date, label };
}

function formatSidebarItem(name, rows) {
  const { label, date } = parseTableName(name);
  const datePart = date ? ` (оновлено ${date})` : "";
  const rowsPart = rows !== null ? `${rows.toLocaleString("uk")} рядків` : "";
  return { displayName: label + datePart, rowsPart };
}

function esc(v) {
  if (v === null || v === undefined) return "";
  return String(v)
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;");
}

// ── THEME ─────────────────────────────────────────────────────────────────────
const themeToggle = document.getElementById("themeToggle");
let isDark = false;
themeToggle.addEventListener("click", () => {
  isDark = !isDark;
  document.documentElement.setAttribute("data-theme", isDark ? "dark" : "light");
  themeToggle.textContent = isDark ? "🌙 Темна" : "☀️ Світла";
});

// ── INIT ──────────────────────────────────────────────────────────────────────
async function init() {
  try {
    await fetch(`${API}/health`);
    document.getElementById("statusDot").style.background = "var(--accent)";
    document.getElementById("statusLabel").textContent = "онлайн";
  } catch {
    document.getElementById("statusDot").style.background = "var(--danger)";
    document.getElementById("statusLabel").textContent = "недоступний";
  }
  await loadTableList();
}

// ── TABLE LIST ────────────────────────────────────────────────────────────────
async function loadTableList() {
  const el = document.getElementById("tableList");
  try {
    const r = await fetch(`${API}/tables`);
    const data = await r.json();
    el.innerHTML = "";
    data.tables.forEach(t => {
      const { displayName, rowsPart } = formatSidebarItem(t.name, t.rows);
      const div = document.createElement("div");
      div.className = "table-item";
      div.dataset.name = t.name;
      div.innerHTML = `
        <div class="table-name">${esc(displayName)}</div>
        <div class="table-meta">${esc(rowsPart)}</div>
      `;
      div.addEventListener("click", () => selectTable(t.name));
      el.appendChild(div);
    });
  } catch {
    el.innerHTML = `<div class="sidebar-loading" style="color:var(--danger)">Помилка завантаження</div>`;
  }
}

// ── SELECT TABLE ──────────────────────────────────────────────────────────────
function selectTable(name) {
  currentTable  = name;
  currentPage   = 1;
  currentSearch = "";
  currentColumn = "";
  currentSort   = { by: null, dir: "asc" };

  document.querySelectorAll(".table-item").forEach(el =>
    el.classList.toggle("active", el.dataset.name === name)
  );

  const { label, date } = parseTableName(name);
  const datePart = date ? ` · ${date}` : "";
  document.getElementById("toolbarTitle").textContent = label + datePart;

  // Опис з labels.js
  const descEl = document.getElementById("descriptionBox");
  const descriptions = window.TABLE_DESCRIPTIONS || {};
  const { code } = parseTableName(name);
  if (descriptions[code]) {
    descEl.textContent = descriptions[code];
    descEl.classList.remove("hidden");
  } else {
    descEl.textContent = "";
    descEl.classList.add("hidden");
  }

  document.getElementById("searchInput").value = "";
  document.getElementById("searchInput").disabled = false;
  document.getElementById("searchBtn").disabled = false;
  document.getElementById("resetBtn").disabled = false;

  loadData();
}

// ── LOAD DATA ─────────────────────────────────────────────────────────────────
async function loadData() {
  if (!currentTable) return;
  showLoading();

  const pageSize = document.getElementById("pageSizeSelect").value;
  const params = new URLSearchParams({ page: currentPage, page_size: pageSize });
  if (currentSearch) params.set("search", currentSearch);
  if (currentColumn) params.set("column", currentColumn);
  if (currentSort.by) {
    params.set("sort_by", currentSort.by);
    params.set("sort_dir", currentSort.dir);
  }

  try {
    const r = await fetch(`${API}/table/${currentTable}?${params}`);
    if (!r.ok) throw new Error(`HTTP ${r.status}`);
    const data = await r.json();
    totalPages = data.total_pages;
    renderTable(data);
    updateColumnSelect(data.columns);
    updatePagination(data);
  } catch(e) {
    showError(e.message);
  }
}

// ── RENDER TABLE ──────────────────────────────────────────────────────────────
function renderTable(data) {
  const wrap = document.getElementById("tableWrap");

  if (!data.rows.length) {
    wrap.innerHTML = `<div class="state-box"><div class="state-icon">🔍</div><div>Нічого не знайдено</div></div>`;
    return;
  }

  const ths = data.columns.map(c => {
    let cls = "";
    if (currentSort.by === c) cls = currentSort.dir === "asc" ? "sort-asc" : "sort-desc";
    return `<th class="${cls}" data-col="${esc(c)}">
      <div class="th-inner">
        <span>${esc(c)}</span>
        <span class="sort-arrows">
          <span class="arr arr-up">▲</span>
          <span class="arr arr-down">▼</span>
        </span>
      </div>
    </th>`;
  }).join("");

  const trs = data.rows.map(row =>
    `<tr>${row.map(cell => `<td title="${esc(cell)}">${esc(cell)}</td>`).join("")}</tr>`
  ).join("");

  wrap.innerHTML = `<table><thead><tr>${ths}</tr></thead><tbody>${trs}</tbody></table>`;

  wrap.querySelectorAll("th").forEach(th => {
    th.addEventListener("click", () => {
      const col = th.dataset.col;
      if (currentSort.by === col) {
        currentSort.dir = currentSort.dir === "asc" ? "desc" : "asc";
      } else {
        currentSort.by  = col;
        currentSort.dir = "asc";
      }
      currentPage = 1;
      loadData();
    });
  });
}

// ── COLUMN SELECT ─────────────────────────────────────────────────────────────
function updateColumnSelect(columns) {
  const sel = document.getElementById("columnSelect");
  sel.disabled = false;
  const prev = sel.value;
  sel.innerHTML = `<option value="">Всі колонки</option>` +
    columns.map(c => `<option value="${esc(c)}" ${c === prev ? "selected" : ""}>${esc(c)}</option>`).join("");
}

// ── PAGINATION ────────────────────────────────────────────────────────────────
function updatePagination(data) {
  const pg = document.getElementById("pagination");
  pg.style.display = "flex";
  const from = (data.page - 1) * data.page_size + 1;
  const to   = Math.min(data.page * data.page_size, data.total_rows);
  document.getElementById("pageInfo").textContent =
    `${from.toLocaleString("uk")}–${to.toLocaleString("uk")} з ${data.total_rows.toLocaleString("uk")} · стор. ${data.page} / ${data.total_pages}`;
  document.getElementById("prevBtn").disabled = data.page <= 1;
  document.getElementById("nextBtn").disabled = data.page >= data.total_pages;
}

// ── STATES ────────────────────────────────────────────────────────────────────
function showLoading() {
  document.getElementById("tableWrap").innerHTML =
    `<div class="state-box"><div class="spinner"></div><div>Завантаження...</div></div>`;
  document.getElementById("pagination").style.display = "none";
}

function showError(msg) {
  document.getElementById("tableWrap").innerHTML =
    `<div class="state-box"><div class="state-icon">⚠️</div><div class="error-text">${esc(msg)}</div></div>`;
  document.getElementById("pagination").style.display = "none";
}

// ── EVENTS ────────────────────────────────────────────────────────────────────
document.getElementById("searchBtn").addEventListener("click", () => {
  currentSearch = document.getElementById("searchInput").value.trim();
  currentColumn = document.getElementById("columnSelect").value;
  currentPage = 1;
  loadData();
});

document.getElementById("searchInput").addEventListener("keydown", e => {
  if (e.key === "Enter") document.getElementById("searchBtn").click();
});

document.getElementById("resetBtn").addEventListener("click", () => {
  currentSearch = "";
  currentColumn = "";
  currentSort   = { by: null, dir: "asc" };
  currentPage   = 1;
  document.getElementById("searchInput").value = "";
  document.getElementById("columnSelect").value = "";
  loadData();
});

document.getElementById("prevBtn").addEventListener("click", () => {
  if (currentPage > 1) { currentPage--; loadData(); }
});

document.getElementById("nextBtn").addEventListener("click", () => {
  if (currentPage < totalPages) { currentPage++; loadData(); }
});

document.getElementById("pageSizeSelect").addEventListener("change", () => {
  currentPage = 1;
  loadData();
});

init();
</script>
</body>
</html>
