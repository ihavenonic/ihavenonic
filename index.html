<!DOCTYPE html>
<html lang="uk" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>НСЗУ — Дані</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=IBM+Plex+Sans:wght@300;400;600&display=swap" rel="stylesheet">
<script src="labels.js"></script>
<style>
  :root {
    --bg: #f5f6f8;
    --surface: #ffffff;
    --surface2: #eef0f3;
    --border: #dde0e6;
    --accent: #16a34a;
    --accent-dim: #dcfce7;
    --text: #111318;
    --text-muted: #6b7280;
    --danger: #dc2626;
    --th-bg: #f0f2f5;
    --row-hover: #f0f2f5;
    --row-border: #eef0f3;
    --scrollbar-thumb: #c8cdd6;
    --mono: 'IBM Plex Mono', monospace;
    --sans: 'IBM Plex Sans', sans-serif;
  }
  [data-theme="dark"] {
    --bg: #0e0f11;
    --surface: #16181c;
    --surface2: #1e2026;
    --border: #2a2d34;
    --accent: #4ade80;
    --accent-dim: #1a3a26;
    --text: #e2e4e9;
    --text-muted: #6b7280;
    --danger: #f87171;
    --th-bg: #16181c;
    --row-hover: #1e2026;
    --row-border: #1e2026;
    --scrollbar-thumb: #3a3d44;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    font-size: 14px;
    min-height: 100vh;
    transition: background .2s, color .2s;
  }

  /* ── HEADER ── */
  header {
    border-bottom: 1px solid var(--border);
    padding: 12px 24px;
    display: flex;
    align-items: center;
    gap: 12px;
    position: sticky;
    top: 0;
    background: var(--surface);
    z-index: 100;
  }
  .logo {
    font-family: var(--mono);
    font-size: 13px;
    font-weight: 600;
    color: var(--accent);
    letter-spacing: .08em;
    text-transform: uppercase;
    white-space: nowrap;
  }
  .header-sep { flex: 1; }
  .status-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--accent); animation: pulse 2s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }
  .status-label { font-family: var(--mono); font-size: 11px; color: var(--text-muted); }

  .hdr-btn {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 4px 12px;
    cursor: pointer;
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text-muted);
    transition: all .15s;
    white-space: nowrap;
  }
  .hdr-btn:hover { border-color: var(--accent); color: var(--accent); }
  .hdr-btn.active { border-color: var(--accent); color: var(--accent); background: var(--accent-dim); }

  /* ── LAYOUT ── */
  .layout {
    display: grid;
    grid-template-columns: 300px 1fr;
    height: calc(100vh - 49px);
  }

  /* ── SIDEBAR ── */
  aside {
    border-right: 1px solid var(--border);
    overflow-y: auto;
    padding: 16px 0;
    background: var(--surface);
  }
  .sidebar-header { padding: 0 16px 12px; font-family: var(--mono); font-size: 11px; color: var(--text-muted); text-transform: uppercase; letter-spacing: .1em; }
  .table-item { padding: 10px 16px; cursor: pointer; border-left: 3px solid transparent; transition: all .15s; display: flex; flex-direction: column; gap: 3px; }
  .table-item:hover { background: var(--surface2); }
  .table-item.active { border-left-color: var(--accent); background: var(--accent-dim); }
  .table-name { font-size: 13px; color: var(--text); line-height: 1.4; }
  .table-meta { font-family: var(--mono); font-size: 11px; color: var(--text-muted); }
  .sidebar-loading { padding: 16px; color: var(--text-muted); font-size: 12px; font-family: var(--mono); }

  /* ── MAIN ── */
  main { display: flex; flex-direction: column; overflow: hidden; background: var(--bg); }

  .toolbar {
    padding: 10px 16px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 8px;
    flex-wrap: wrap;
    background: var(--surface);
  }
  .toolbar-title { font-family: var(--mono); font-size: 13px; color: var(--accent); flex: 1; min-width: 160px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

  input[type=text], select {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 6px 10px;
    border-radius: 6px;
    font-family: var(--mono);
    font-size: 12px;
    outline: none;
    transition: border-color .15s;
  }
  input[type=text]:focus, select:focus { border-color: var(--accent); }
  #searchInput { width: 200px; }
  #columnSelect { width: 150px; }
  #pageSizeSelect { width: 110px; }

  .btn { padding: 6px 14px; border-radius: 6px; border: none; cursor: pointer; font-family: var(--mono); font-size: 12px; font-weight: 600; transition: all .15s; }
  .btn-primary { background: var(--accent); color: #fff; }
  [data-theme="dark"] .btn-primary { color: #000; }
  .btn-primary:hover { opacity: .85; }
  .btn-ghost { background: transparent; border: 1px solid var(--border); color: var(--text-muted); }
  .btn-ghost:hover { border-color: var(--accent); color: var(--accent); }
  .btn-ghost:disabled { opacity: .4; cursor: default; }

  /* ── CONTENT AREA ── */
  .content-area { flex: 1; display: flex; flex-direction: column; overflow: hidden; }

  /* ── WELCOME (no table selected) ── */
  .welcome {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 40px;
    transition: all .3s;
  }
  .welcome.hidden { display: none; }
  .welcome-inner {
    max-width: 560px;
    text-align: center;
  }
  .welcome-title {
    font-family: var(--mono);
    font-size: 22px;
    font-weight: 600;
    color: var(--accent);
    margin-bottom: 16px;
    letter-spacing: .04em;
  }
  .welcome-desc {
    font-size: 14px;
    color: var(--text-muted);
    line-height: 1.7;
    white-space: pre-wrap;
  }

  /* ── TABLE VIEW ── */
  .table-view { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
  .table-view.hidden { display: none; }

  /* ── DESCRIPTION BOX ── */
  .description-box {
    margin: 12px 16px 0;
    padding: 10px 14px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-left: 3px solid var(--accent);
    border-radius: 6px;
    font-size: 13px;
    color: var(--text-muted);
    line-height: 1.6;
    white-space: pre-wrap;
  }
  .description-box.hidden { display: none; }

  /* ── TABLE ── */
  .table-wrap { flex: 1; overflow: auto; margin-top: 12px; }
  table { width: 100%; border-collapse: collapse; font-size: 12px; }
  thead { position: sticky; top: 0; z-index: 10; background: var(--th-bg); }
  th {
    padding: 9px 14px;
    text-align: left;
    font-family: var(--mono);
    font-size: 11px;
    font-weight: 600;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: .07em;
    border-bottom: 1px solid var(--border);
    white-space: nowrap;
    cursor: pointer;
    user-select: none;
  }
  th:hover { color: var(--accent); }
  .th-inner { display: flex; align-items: center; gap: 5px; }
  .sort-arrows { display: flex; flex-direction: column; gap: 1px; opacity: .25; }
  .sort-arrows .arr { font-size: 8px; line-height: 1; }
  th.sort-asc  .sort-arrows { opacity: 1; }
  th.sort-asc  .arr-up   { color: var(--accent); }
  th.sort-desc .sort-arrows { opacity: 1; }
  th.sort-desc .arr-down { color: var(--accent); }

  td { padding: 7px 14px; border-bottom: 1px solid var(--row-border); color: var(--text); max-width: 320px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; font-family: var(--mono); font-size: 12px; }
  tr:hover td { background: var(--row-hover); }

  /* ── PAGINATION ── */
  .pagination { padding: 8px 16px; border-top: 1px solid var(--border); display: flex; align-items: center; gap: 8px; font-family: var(--mono); font-size: 12px; color: var(--text-muted); background: var(--surface); flex-wrap: wrap; }
  .pagination .sep { flex: 1; }
  .page-info { color: var(--text); }

  /* ── STATES ── */
  .state-box { display: flex; align-items: center; justify-content: center; height: 200px; flex-direction: column; gap: 12px; color: var(--text-muted); font-family: var(--mono); font-size: 13px; }
  .state-icon { font-size: 32px; }
  .error-text { color: var(--danger); font-size: 12px; max-width: 400px; text-align: center; }
  .spinner { width: 24px; height: 24px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin .7s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--scrollbar-thumb); border-radius: 3px; }
</style>
</head>
<body>

<header>
  <div class="logo">НСЗУ / <span id="hdrSubtitle">Відкриті дані</span></div>
  <div class="header-sep"></div>
  <button class="hdr-btn" id="langToggle">EN</button>
  <button class="hdr-btn" id="themeToggle">☀️</button>
  <div class="status-dot" id="statusDot"></div>
  <div class="status-label" id="statusLabel">...</div>
</header>

<div class="layout">
  <aside>
    <div class="sidebar-header" id="sidebarHeader">Таблиці</div>
    <div id="tableList"><div class="sidebar-loading" id="sidebarLoading">Завантаження...</div></div>
  </aside>

  <main>
    <div class="toolbar">
      <div class="toolbar-title" id="toolbarTitle">←</div>
      <input type="text" id="searchInput" placeholder="Пошук..." disabled>
      <select id="columnSelect" disabled><option value="" data-uk="Всі колонки" data-en="All columns">Всі колонки</option></select>
      <button class="btn btn-primary" id="searchBtn" disabled data-uk="Знайти" data-en="Search">Знайти</button>
      <button class="btn btn-ghost"   id="resetBtn"  disabled data-uk="Скинути фільтри" data-en="Reset filters">Скинути фільтри</button>
      <select id="pageSizeSelect">
        <option value="100"   selected data-uk="100 рядків"     data-en="100 rows">100 рядків</option>
        <option value="1000"           data-uk="1 000 рядків"   data-en="1 000 rows">1 000 рядків</option>
        <option value="10000"          data-uk="10 000 рядків"  data-en="10 000 rows">10 000 рядків</option>
      </select>
    </div>

    <div class="content-area">
      <!-- Welcome screen -->
      <div class="welcome" id="welcomeBox">
        <div class="welcome-inner">
          <div class="welcome-title" id="welcomeTitle">НСЗУ — Відкриті дані</div>
          <div class="welcome-desc" id="welcomeDesc"></div>
        </div>
      </div>

      <!-- Table view -->
      <div class="table-view hidden" id="tableView">
        <div class="description-box hidden" id="descriptionBox"></div>
        <div class="table-wrap" id="tableWrap"></div>
        <div class="pagination" id="pagination" style="display:none">
          <button class="btn btn-ghost" id="prevBtn" data-uk="← Назад" data-en="← Prev">← Назад</button>
          <button class="btn btn-ghost" id="nextBtn" data-uk="Вперед →" data-en="Next →">Вперед →</button>
          <div class="sep"></div>
          <div class="page-info" id="pageInfo"></div>
        </div>
      </div>
    </div>
  </main>
</div>

<script>
// ── CONFIG ────────────────────────────────────────────────────────────────────
const API = "https://web-production-02dcb.up.railway.app";

// ── STATE ─────────────────────────────────────────────────────────────────────
let currentTable  = null;
let currentPage   = 1;
let totalPages    = 1;
let currentSearch = "";
let currentColumn = "";
let currentSort   = { by: null, dir: "asc" };
let lang          = "uk";   // "uk" | "en"
let isDark        = false;

// ── I18N ─────────────────────────────────────────────────────────────────────
const UI = {
  uk: {
    subtitle:      "Відкриті дані",
    sidebarHeader: "Таблиці",
    loading:       "Завантаження...",
    loadError:     "Помилка завантаження",
    online:        "онлайн",
    offline:       "недоступний",
    connecting:    "з'єднання...",
    selectPrompt:  "← Оберіть таблицю",
    noResults:     "Нічого не знайдено",
    searching:     "Завантаження...",
    pageInfo:      (f, t, total, p, tp) => `${f}–${t} з ${total} · стор. ${p} / ${tp}`,
  },
  en: {
    subtitle:      "Open Data",
    sidebarHeader: "Tables",
    loading:       "Loading...",
    loadError:     "Failed to load",
    online:        "online",
    offline:       "unavailable",
    connecting:    "connecting...",
    selectPrompt:  "← Select a table",
    noResults:     "No results found",
    searching:     "Loading...",
    pageInfo:      (f, t, total, p, tp) => `${f}–${t} of ${total} · page ${p} / ${tp}`,
  },
};

function t(key, ...args) {
  const fn = UI[lang][key];
  return typeof fn === "function" ? fn(...args) : fn;
}

// ── HELPERS ───────────────────────────────────────────────────────────────────
const CFG = () => window.SITE_CONFIG || {};

// Парсить назву таблиці -> { code, slug, date }
// latest_573546_2026_03_09_active_declarations_by_age_gender
// -> { code:"573546", slug:"active_declarations_by_age_gender", date:"2026-03-09" }
function parseTableName(name) {
  const s = name.replace(/^latest_/, "");
  const parts = s.split("_");
  const code = parts[0];

  const dateIdx = parts.findIndex((p, i) => i > 0 && /^\d{4}$/.test(p) && parts[i+1] && /^\d{2}$/.test(parts[i+1]));
  let date = null;
  let slugStart = 1;
  if (dateIdx !== -1) {
    date = `${parts[dateIdx]}-${parts[dateIdx+1]}-${parts[dateIdx+2]}`;
    slugStart = dateIdx + 3;
  }
  const slug = parts.slice(slugStart).join("_");
  return { code, slug, date, key: slug ? `${code}_${slug}` : code };
}

function getTableConfig(name) {
  const { key } = parseTableName(name);
  return (CFG().tables || {})[key] || null;
}

function getLabel(name) {
  const cfg = getTableConfig(name);
  if (!cfg) {
    const { slug } = parseTableName(name);
    return slug.replace(/_/g, " ");
  }
  return (lang === "en" && cfg.label_en) ? cfg.label_en : (cfg.label_uk || parseTableName(name).slug.replace(/_/g, " "));
}

function getDesc(name) {
  const cfg = getTableConfig(name);
  if (!cfg) return "";
  return (lang === "en" && cfg.desc_en) ? cfg.desc_en : (cfg.desc_uk || "");
}

function getColLabel(tableName, colName) {
  const cfg = getTableConfig(tableName);
  if (!cfg || !cfg.columns || !cfg.columns[colName]) return colName;
  const map = cfg.columns[colName];
  return (lang === "en" && map.en) ? map.en : (map.uk || colName);
}

function isHidden(name) {
  const cfg = getTableConfig(name);
  return cfg && cfg.hidden === true;
}

function esc(v) {
  if (v === null || v === undefined) return "";
  return String(v).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
}

// ── APPLY LANG ────────────────────────────────────────────────────────────────
function applyLang() {
  document.getElementById("hdrSubtitle").textContent    = t("subtitle");
  document.getElementById("sidebarHeader").textContent  = t("sidebarHeader");

  // Кнопки з data-uk/data-en
  document.querySelectorAll("[data-uk]").forEach(el => {
    el.textContent = lang === "en" ? el.dataset.en : el.dataset.uk;
  });

  // Welcome
  const siteDesc = lang === "en" ? CFG().site_desc_en : CFG().site_desc_uk;
  document.getElementById("welcomeDesc").textContent = siteDesc || "";

  // Toolbar title
  if (!currentTable) {
    document.getElementById("toolbarTitle").textContent = t("selectPrompt");
  } else {
    const { date } = parseTableName(currentTable);
    const datePart = date ? ` · ${date}` : "";
    document.getElementById("toolbarTitle").textContent = getLabel(currentTable) + datePart;
  }

  // Description
  if (currentTable) {
    const desc = getDesc(currentTable);
    const descEl = document.getElementById("descriptionBox");
    descEl.textContent = desc;
    descEl.classList.toggle("hidden", !desc);
  }

  // Re-render table headers if table is open (to update column labels)
  if (currentTable && lastData) renderTable(lastData);
}

// ── THEME ─────────────────────────────────────────────────────────────────────
document.getElementById("themeToggle").addEventListener("click", () => {
  isDark = !isDark;
  document.documentElement.setAttribute("data-theme", isDark ? "dark" : "light");
  document.getElementById("themeToggle").textContent = isDark ? "🌙" : "☀️";
});

// ── LANG TOGGLE ───────────────────────────────────────────────────────────────
document.getElementById("langToggle").addEventListener("click", () => {
  lang = lang === "uk" ? "en" : "uk";
  document.getElementById("langToggle").textContent = lang === "uk" ? "EN" : "УК";
  document.getElementById("langToggle").classList.toggle("active", lang === "en");
  applyLang();
  // Reload sidebar labels
  loadTableList();
});

// ── INIT ──────────────────────────────────────────────────────────────────────
async function init() {
  document.getElementById("statusLabel").textContent = t("connecting");

  // Welcome desc
  const siteDesc = CFG().site_desc_uk || "";
  document.getElementById("welcomeDesc").textContent = siteDesc;

  try {
    await fetch(`${API}/health`);
    document.getElementById("statusDot").style.background = "var(--accent)";
    document.getElementById("statusLabel").textContent = t("online");
  } catch {
    document.getElementById("statusDot").style.background = "var(--danger)";
    document.getElementById("statusLabel").textContent = t("offline");
  }
  await loadTableList();
}

// ── TABLE LIST ────────────────────────────────────────────────────────────────
async function loadTableList() {
  const el = document.getElementById("tableList");
  el.innerHTML = `<div class="sidebar-loading">${t("loading")}</div>`;
  try {
    const r = await fetch(`${API}/tables`);
    const data = await r.json();
    el.innerHTML = "";
    data.tables.forEach(t_item => {
      if (isHidden(t_item.name)) return;
      const label = getLabel(t_item.name);
      const { date } = parseTableName(t_item.name);
      const datePart = date ? `оновлено ${date}` : "";
      const rowsPart = t_item.rows !== null ? `${t_item.rows.toLocaleString("uk")} ${lang === "en" ? "rows" : "рядків"}` : "";
      const meta = [datePart, rowsPart].filter(Boolean).join(" · ");

      const div = document.createElement("div");
      div.className = "table-item" + (currentTable === t_item.name ? " active" : "");
      div.dataset.name = t_item.name;
      div.innerHTML = `<div class="table-name">${esc(label)}</div><div class="table-meta">${esc(meta)}</div>`;
      div.addEventListener("click", () => selectTable(t_item.name));
      el.appendChild(div);
    });
  } catch {
    el.innerHTML = `<div class="sidebar-loading" style="color:var(--danger)">${t("loadError")}</div>`;
  }
}

// ── SELECT TABLE ──────────────────────────────────────────────────────────────
function selectTable(name) {
  currentTable  = name;
  currentPage   = 1;
  currentSearch = "";
  currentColumn = "";
  currentSort   = { by: null, dir: "asc" };

  document.querySelectorAll(".table-item").forEach(el =>
    el.classList.toggle("active", el.dataset.name === name)
  );

  // Switch welcome -> table view
  document.getElementById("welcomeBox").classList.add("hidden");
  document.getElementById("tableView").classList.remove("hidden");

  const { date } = parseTableName(name);
  const datePart = date ? ` · ${date}` : "";
  document.getElementById("toolbarTitle").textContent = getLabel(name) + datePart;

  const desc = getDesc(name);
  const descEl = document.getElementById("descriptionBox");
  descEl.textContent = desc;
  descEl.classList.toggle("hidden", !desc);

  document.getElementById("searchInput").value = "";
  document.getElementById("searchInput").disabled = false;
  document.getElementById("searchBtn").disabled = false;
  document.getElementById("resetBtn").disabled = false;

  loadData();
}

// ── LAST DATA (for lang re-render) ───────────────────────────────────────────
let lastData = null;

// ── LOAD DATA ─────────────────────────────────────────────────────────────────
async function loadData() {
  if (!currentTable) return;
  showLoading();

  const pageSize = document.getElementById("pageSizeSelect").value;
  const params = new URLSearchParams({ page: currentPage, page_size: pageSize });
  if (currentSearch) params.set("search", currentSearch);
  if (currentColumn) params.set("column", currentColumn);
  if (currentSort.by) {
    params.set("sort_by", currentSort.by);
    params.set("sort_dir", currentSort.dir);
  }

  try {
    const r = await fetch(`${API}/table/${currentTable}?${params}`);
    if (!r.ok) throw new Error(`HTTP ${r.status}`);
    const data = await r.json();
    lastData   = data;
    totalPages = data.total_pages;
    renderTable(data);
    updateColumnSelect(data.columns);
    updatePagination(data);
  } catch(e) {
    showError(e.message);
  }
}

// ── RENDER TABLE ──────────────────────────────────────────────────────────────
function renderTable(data) {
  const wrap = document.getElementById("tableWrap");

  if (!data.rows.length) {
    wrap.innerHTML = `<div class="state-box"><div class="state-icon">🔍</div><div>${t("noResults")}</div></div>`;
    return;
  }

  const ths = data.columns.map(c => {
    const label = getColLabel(currentTable, c);
    let cls = "";
    if (currentSort.by === c) cls = currentSort.dir === "asc" ? "sort-asc" : "sort-desc";
    return `<th class="${cls}" data-col="${esc(c)}" title="${esc(c)}">
      <div class="th-inner">
        <span>${esc(label)}</span>
        <span class="sort-arrows"><span class="arr arr-up">▲</span><span class="arr arr-down">▼</span></span>
      </div>
    </th>`;
  }).join("");

  const trs = data.rows.map(row =>
    `<tr>${row.map(cell => `<td title="${esc(cell)}">${esc(cell)}</td>`).join("")}</tr>`
  ).join("");

  wrap.innerHTML = `<table><thead><tr>${ths}</tr></thead><tbody>${trs}</tbody></table>`;

  wrap.querySelectorAll("th").forEach(th => {
    th.addEventListener("click", () => {
      const col = th.dataset.col;
      currentSort.by  = col;
      currentSort.dir = (currentSort.by === col && currentSort.dir === "asc") ? "desc" : "asc";
      // fix: set by first, then toggle
      if (th.classList.contains("sort-asc")) {
        currentSort.dir = "desc";
      } else if (th.classList.contains("sort-desc")) {
        currentSort.dir = "asc";
      } else {
        currentSort.dir = "asc";
      }
      currentSort.by = col;
      currentPage = 1;
      loadData();
    });
  });
}

// ── COLUMN SELECT ─────────────────────────────────────────────────────────────
function updateColumnSelect(columns) {
  const sel = document.getElementById("columnSelect");
  sel.disabled = false;
  const prev = sel.value;
  const allLabel = lang === "en" ? "All columns" : "Всі колонки";
  sel.innerHTML = `<option value="">${allLabel}</option>` +
    columns.map(c => {
      const label = getColLabel(currentTable, c);
      return `<option value="${esc(c)}" ${c === prev ? "selected" : ""}>${esc(label)}</option>`;
    }).join("");
}

// ── PAGINATION ────────────────────────────────────────────────────────────────
function updatePagination(data) {
  const pg = document.getElementById("pagination");
  pg.style.display = "flex";
  const from = ((data.page - 1) * data.page_size + 1).toLocaleString("uk");
  const to   = Math.min(data.page * data.page_size, data.total_rows).toLocaleString("uk");
  const total = data.total_rows.toLocaleString("uk");
  document.getElementById("pageInfo").textContent =
    t("pageInfo", from, to, total, data.page, data.total_pages);
  document.getElementById("prevBtn").disabled = data.page <= 1;
  document.getElementById("nextBtn").disabled = data.page >= data.total_pages;
}

// ── STATES ────────────────────────────────────────────────────────────────────
function showLoading() {
  document.getElementById("tableWrap").innerHTML =
    `<div class="state-box"><div class="spinner"></div><div>${t("searching")}</div></div>`;
  document.getElementById("pagination").style.display = "none";
}
function showError(msg) {
  document.getElementById("tableWrap").innerHTML =
    `<div class="state-box"><div class="state-icon">⚠️</div><div class="error-text">${esc(msg)}</div></div>`;
  document.getElementById("pagination").style.display = "none";
}

// ── EVENTS ────────────────────────────────────────────────────────────────────
document.getElementById("searchBtn").addEventListener("click", () => {
  currentSearch = document.getElementById("searchInput").value.trim();
  currentColumn = document.getElementById("columnSelect").value;
  currentPage = 1;
  loadData();
});
document.getElementById("searchInput").addEventListener("keydown", e => {
  if (e.key === "Enter") document.getElementById("searchBtn").click();
});
document.getElementById("resetBtn").addEventListener("click", () => {
  currentSearch = "";
  currentColumn = "";
  currentSort   = { by: null, dir: "asc" };
  currentPage   = 1;
  document.getElementById("searchInput").value = "";
  document.getElementById("columnSelect").value = "";
  loadData();
});
document.getElementById("prevBtn").addEventListener("click", () => {
  if (currentPage > 1) { currentPage--; loadData(); }
});
document.getElementById("nextBtn").addEventListener("click", () => {
  if (currentPage < totalPages) { currentPage++; loadData(); }
});
document.getElementById("pageSizeSelect").addEventListener("change", () => {
  currentPage = 1;
  loadData();
});

init();
</script>
</body>
</html>
